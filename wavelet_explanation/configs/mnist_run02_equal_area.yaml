# Run 02 — Equal area weights (unbiased frequency test)
# All subbands penalised equally — lets the network reveal which frequencies
# ResNet/CNN actually needs WITHOUT any prior bias from the experimenter.
# Compare subband_activity_profile vs run01 to see if HH is intrinsically
# suppressed or only suppressed because we penalise it harder.
backbone: custom_cnn
pretrained: false
dataset: mnist
image_size: 28
batch_size: 32
lr: 1.0e-3
epochs: 50
classifier_checkpoint: mnist_classifier.pth

lambda_act: 0.6
lambda_CE:  4.0
lambda_KL:  0.54
lambda_rob: 10.0
lambda_bin: 1.2

# Equal area penalty across all subbands — no frequency bias
lambda_area_LL: 40.0
lambda_area_LH: 40.0
lambda_area_HL: 40.0
lambda_area_HH: 40.0

wavelet: haar
levels: 1
